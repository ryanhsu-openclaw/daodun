<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>我的刀盾 濾鏡版</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:system-ui,sans-serif}
    #cam{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;background:#000;z-index:1}
    #fx{position:fixed;inset:0;z-index:2}
    #ui{position:fixed;inset:0;pointer-events:none;z-index:3}
    .btns{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:14px;pointer-events:auto}
    .skill{width:68px;height:68px;border:0;border-radius:18px;background:rgba(255,255,255,.18);backdrop-filter:blur(4px);color:#fff;font-size:28px;box-shadow:0 8px 24px rgba(0,0,0,.26),inset 0 0 0 1px rgba(255,255,255,.22)}
    #btnCam{position:absolute;left:14px;bottom:14px;pointer-events:auto;background:rgba(32,32,32,.9);color:#fff;border:0;border-radius:12px;padding:10px 14px;font-weight:700}
    #joy{position:fixed;inset:0;pointer-events:none;z-index:4}
    .ring,.knob{position:absolute;border-radius:50%;display:none}.ring{width:92px;height:92px;margin:-46px 0 0 -46px;background:rgba(255,255,255,.14)}.knob{width:46px;height:46px;margin:-23px 0 0 -23px;background:rgba(255,255,255,.52)}
  </style>
</head>
<body>
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="fx"></canvas>
  <div id="ui">
    <div class="btns">
      <button class="skill" id="btnShield">🛡️</button>
      <button class="skill" id="btnRoar">💢</button>
      <button class="skill" id="btnSlash">⚔️</button>
    </div>
    <button id="btnCam">啟動相機</button>
  </div>
  <div id="joy"><div class="ring" id="ring"></div><div class="knob" id="knob"></div></div>

<script>
(() => {
  const video=document.getElementById('cam');
  const canvas=document.getElementById('fx');
  const ctx=canvas.getContext('2d');
  const btnCam=document.getElementById('btnCam');
  const ring=document.getElementById('ring');
  const knob=document.getElementById('knob');

  const actor={x:0.174,y:0.188,z:0.82,dir:1,walk:0}; // normalized screen coords (~70,123 on 402x654)
  const joy={active:false,id:null,bx:0,by:0,kx:0,ky:0,dx:0,dy:0,max:46};
  let viewportW = innerWidth;
  let viewportH = innerHeight;
  let shieldUntil=0,roarUntil=0,slashUntil=0;

  function hardCenter(){
    actor.x=0.174; actor.y=0.188; actor.z=0.82;
    joy.dx=0; joy.dy=0;
  }
  let shake=0;

  function resize(){
    canvas.width=innerWidth*devicePixelRatio;
    canvas.height=innerHeight*devicePixelRatio;
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  }
  addEventListener('resize',()=>{ resize(); viewportW=Math.round(window.innerWidth); viewportH=Math.round(window.innerHeight); });
resize();

  btnCam.onclick=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
      video.srcObject=s; await video.play(); btnCam.style.display='none';
    }catch{btnCam.textContent='相機不可用';}
  };

  function setJoy(x,y){
    const dx=x-joy.bx,dy=y-joy.by,d=Math.hypot(dx,dy)||1,c=Math.min(joy.max,d);
    joy.kx=joy.bx+dx/d*c; joy.ky=joy.by+dy/d*c;
    joy.dx=(joy.kx-joy.bx)/joy.max; joy.dy=(joy.ky-joy.by)/joy.max;
    ring.style.left=joy.bx+'px'; ring.style.top=joy.by+'px';
    knob.style.left=joy.kx+'px'; knob.style.top=joy.ky+'px';
  }
  function down(e){const p=e.touches?e.changedTouches[0]:e;joy.active=true;joy.id=p.identifier??'m';joy.bx=p.clientX;joy.by=p.clientY;ring.style.display=knob.style.display='block';setJoy(p.clientX,p.clientY)}
  function move(e){if(!joy.active)return;if(e.touches){for(const t of e.touches) if(t.identifier===joy.id) setJoy(t.clientX,t.clientY)} else setJoy(e.clientX,e.clientY)}
  function up(){joy.active=false;joy.dx=joy.dy=0;ring.style.display=knob.style.display='none'}
  canvas.addEventListener('pointerdown',down);canvas.addEventListener('pointermove',move);addEventListener('pointerup',up);
  canvas.addEventListener('touchstart',down,{passive:true});canvas.addEventListener('touchmove',move,{passive:true});addEventListener('touchend',up,{passive:true});

  document.getElementById('btnShield').onclick=()=>{shieldUntil=performance.now()+950; shake=8;};
  document.getElementById('btnRoar').onclick=()=>{roarUntil=performance.now()+820; shake=12;};
  document.getElementById('btnSlash').onclick=()=>{ const now=performance.now(); slashUntil = (slashUntil>now ? Math.min(slashUntil+380, now+1400) : now+760); shake=Math.max(shake,8); };

  function limb(x,y,len,ang,w,color){
    const ex=x+Math.cos(ang)*len, ey=y+Math.sin(ang)*len;
    ctx.lineWidth=w; ctx.strokeStyle=color; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(ex,ey); ctx.stroke();
    return [ex,ey];
  }

  function drawActor(now){
    const sRaw = 1.06 - actor.z * 0.82; // slightly shorter overall body
    const s = Math.min(0.66, sRaw);
    const tNow = performance.now();
    const attacking = tNow < slashUntil;
    const roaring = tNow < roarUntil;

    // hard pixel-space bounds from actual drawn extents (more reliable than symmetric padding)
    const leftExtent = Math.max(36, 95 * s);
    const rightExtent = Math.max(72, 150 * s) + (attacking ? 42 * s : 0) + (roaring ? 18 * s : 0);
    const topExtent = Math.max(46, 120 * s);
    const bottomExtent = Math.max(58, 138 * s) + (attacking ? 24 * s : 0);

    const minX = leftExtent;
    const maxX = Math.min(viewportW - rightExtent, 140);
    const minY = topExtent;
    const maxY = Math.min(viewportH - bottomExtent, 220);

    let x = actor.x * viewportW;
    let y = actor.y * viewportH;
    x = Math.max(minX, Math.min(maxX, x));
    y = Math.max(minY, Math.min(maxY, y));

    actor.x = x / viewportW;
    actor.y = y / viewportH;
    actor.y = y / viewportH;

    const moving=Math.hypot(joy.dx,joy.dy)>0.08;
    actor.walk += moving?0.34:0.1;
    const bob=(moving?Math.sin(actor.walk)*7:Math.sin(actor.walk*.5)*2)*s;

    const torsoH=96*s, torsoW=60*s, headR=29*s;
    const hipY=y-56*s+bob, chestY=hipY-torsoH*.55;

    let lArm=-0.82,rArm=-0.82,lFore=.18,rFore=.18,lLeg=1.52,rLeg=1.52,lShin=1.08,rShin=1.08,bodyTilt=0,headTilt=0;
    if(moving){
      const a=Math.sin(actor.walk), b=Math.sin(actor.walk+Math.PI);
      lArm=-0.84+b*0.68; rArm=-0.84+a*0.68;
      lLeg=1.58+a*0.62; rLeg=1.58+b*0.62;
      lShin=1.1+Math.max(0,-a)*0.68; rShin=1.1+Math.max(0,-b)*0.68;
      bodyTilt = joy.dy>0.06 ? -0.2 : joy.dy<-0.06 ? 0.16 : 0;
      headTilt = -bodyTilt*0.45;
    }

    const t=performance.now();
    const shieldActive = t < shieldUntil;
    const roarActive = t < roarUntil;
    const slashActive = t < slashUntil;

    if(shieldActive){
      const p=1-(shieldUntil-t)/950;
      const ease = Math.sin(p * Math.PI * 0.5);
      lArm=-0.86 - 0.02*ease;
      lFore=-0.10 - 0.01*ease;
      rArm=-0.95; rFore=0.22;
      bodyTilt=-0.02 - 0.01*ease;
      headTilt=0.01;
    }
    if(roarActive){
      const p=1-(roarUntil-t)/820;
      const burst=Math.sin(p*Math.PI);
      lArm=-2.35; rArm=-2.35; lFore=-0.45; rFore=-0.45;
      bodyTilt=-0.38; headTilt=-0.62;
      ctx.strokeStyle=`rgba(255,180,80,${1-p})`; ctx.lineWidth=7*(1-p)+1;
      ctx.beginPath(); ctx.arc(x, chestY-65*s, 38*s+p*150*s, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x, chestY-65*s, 24*s+p*90*s, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.96)'; ctx.font=`${36*s}px system-ui`; ctx.textAlign='center';
      ctx.fillText('啊啊啊！！', x, chestY-112*s-burst*20*s);
    }
    if(slashActive){
      const p=1-(slashUntil-t)/760;
      const ease = p < 0.5 ? (2*p*p) : (1 - Math.pow(-2*p+2,2)/2);
      // smoother slash pose (no light-trail effect)
      rArm=-1.12 + ease*1.52;
      rFore=-0.82 + ease*1.18;
      bodyTilt=-0.08 + ease*0.18;
    }

    // shadow
    ctx.fillStyle='rgba(0,0,0,.28)';
    ctx.beginPath(); ctx.ellipse(x,y+16*s,44*s,15*s,0,0,Math.PI*2); ctx.fill();

    ctx.save();
    ctx.translate(x,hipY);
    ctx.scale(actor.dir,1);
    ctx.rotate(bodyTilt);

    ctx.fillStyle='#6aa0ff';
    ctx.beginPath(); ctx.roundRect(-torsoW/2,-torsoH,torsoW,torsoH,16*s); ctx.fill();

    ctx.save();
    ctx.translate(0,-torsoH-headR*.35); ctx.rotate(headTilt);
    ctx.fillStyle='#ffd7b0'; ctx.beginPath(); ctx.arc(0,0,headR,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(-headR*.32,-headR*.08,headR*.09,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(headR*.32,-headR*.08,headR*.09,0,Math.PI*2); ctx.fill();
    ctx.restore();

    const shY=-torsoH*.75, shX=torsoW*.55;
    const [lhx,lhy]=limb(-shX,shY,46*s,lArm,12*s,'#6aa0ff');
    const [lh2x,lh2y]=limb(lhx,lhy,42*s,lArm+lFore,11*s,'#ffd7b0');
    const [rhx,rhy]=limb(shX,shY,46*s,rArm,12*s,'#6aa0ff');
    const [rh2x,rh2y]=limb(rhx,rhy,42*s,rArm+rFore,11*s,'#ffd7b0');

    // shield
    ctx.save();
    if(shieldActive){
      // reference-like front-left guard: shield in front of chest/head line
      const guardX = lh2x + 18*s;
      const guardY = lh2y + 46*s + 25;
      ctx.translate(guardX, guardY);
      ctx.rotate(lArm + lFore);
      ctx.scale(1.16,1.20);
    } else {
      ctx.translate(lh2x + 4*s, lh2y - 2*s);
      ctx.rotate(lArm + lFore);
      ctx.scale(0.95,0.95);
    }
    ctx.fillStyle='#9cb8ff'; ctx.beginPath(); ctx.ellipse(0,0,22*s,30*s,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.88)'; ctx.lineWidth=3*s; ctx.stroke();
    ctx.restore();

    // sword (hand grips handle at hilt)
    ctx.save();
    ctx.translate(rh2x,rh2y); ctx.rotate(rArm+rFore-0.08);
    // blade extends forward from hilt
    ctx.fillStyle='#c3d0e8'; ctx.fillRect(-2*s,-54*s,4*s,54*s);
    // crossguard at grip point
    ctx.fillStyle='#6f7f99'; ctx.fillRect(-10*s,-2*s,20*s,4*s);
    // handle below guard (in hand)
    ctx.fillStyle='#5a4637'; ctx.fillRect(-2.5*s,2*s,5*s,14*s);
    ctx.restore();

    const hipOff=torsoW*.24;
    const [lkx,lky]=limb(-hipOff,0,50*s,lLeg,13*s,'#3a3f49'); limb(lkx,lky,45*s,lLeg+lShin,12*s,'#30343c');
    const [rkx,rky]=limb(hipOff,0,50*s,rLeg,13*s,'#3a3f49'); limb(rkx,rky,45*s,rLeg+rShin,12*s,'#30343c');

    ctx.restore();
  }

  let last=performance.now();
  let booted=false;
  let centerFrames=0;
  function loop(now){
    const dt=Math.min(.033,(now-last)/1000); last=now;

    viewportW = Math.round(window.innerWidth);
    viewportH = Math.round(window.innerHeight);

    if(!booted){
      actor.x=0.174; actor.y=0.188; actor.z=0.82;
      joy.dx=0; joy.dy=0;
      booted=true;
    }

    if(centerFrames>0){
      // hard lock at exact center during startup frames
      actor.x=0.174; actor.y=0.188; actor.z=0.82;
      joy.dx=0; joy.dy=0;
      centerFrames--;
    } else {
      // filter-style full-screen movement
      actor.x += joy.dx * 0.52 * dt;
      actor.y += joy.dy * 0.28 * dt;
      actor.z -= joy.dy * 0.95 * dt;
      actor.z = Math.max(0.70, Math.min(0.98, actor.z));
      if(Math.abs(joy.dx)>0.06) actor.dir = Math.sign(joy.dx);
    }

    if(!Number.isFinite(actor.x) || !Number.isFinite(actor.y) || actor.x < 0 || actor.x > 1 || actor.y < 0 || actor.y > 1){
      actor.x = 0.174; actor.y = 0.188; actor.z = 0.82;
    }

    if(shake>0){ shake*=0.86; }
    const sx=(Math.random()-.5)*shake;
    const sy=(Math.random()-.5)*shake;

    ctx.save();
    ctx.translate(sx,sy);
    ctx.clearRect(-sx,-sy,innerWidth,innerHeight);
    drawActor(now);
    // debug info (draw in screen coordinate space)
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    const iw = Math.round(window.innerWidth);
    const ih = Math.round(window.innerHeight);
    const vw = Math.round(window.visualViewport?.width || 0);
    const vh = Math.round(window.visualViewport?.height || 0);
    const cx = Math.round(iw/2), cy = Math.round(ih/2);

    ctx.fillStyle='rgba(0,0,0,.55)';
    ctx.fillRect(8,8,360,124);
    ctx.fillStyle='#fff';
    ctx.font='12px monospace';
    ctx.fillText(`inner W/H: ${iw} x ${ih}`, 16, 28);
    ctx.fillText(`visual W/H: ${vw} x ${vh}`, 16, 44);
    ctx.fillText(`inner center: (${cx}, ${cy})`, 16, 60);
    ctx.fillText(`actor(px): (${Math.round(actor.x*iw)}, ${Math.round(actor.y*ih)})`, 16, 76);
    ctx.fillText(`z: ${actor.z.toFixed(3)}  scale: ${Math.min(0.66, (1.06 - actor.z*0.82)).toFixed(3)}`, 16, 92);
    ctx.fillText(`bounds: hard cap max at (140,220)`, 16, 108);

    // center crosshair
    ctx.strokeStyle='rgba(255,255,255,.7)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx-16, cy); ctx.lineTo(cx+16, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy-16); ctx.lineTo(cx, cy+16); ctx.stroke();
    ctx.restore();
    // center marker (very light) to align expected screen center
    ctx.strokeStyle='rgba(255,255,255,.45)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(viewportW*0.5-14, viewportH*0.5); ctx.lineTo(viewportW*0.5+14, viewportH*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(viewportW*0.5, viewportH*0.5-14); ctx.lineTo(viewportW*0.5, viewportH*0.5+14); ctx.stroke();
    ctx.restore();

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
