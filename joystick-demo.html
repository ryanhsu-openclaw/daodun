<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>我的刀盾 Demo</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; overflow: hidden; font-family: system-ui, sans-serif; }
    #wrap { position: fixed; inset: 0; }
    #bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(.72); }
    #fx { position: absolute; inset: 0; width: 100%; height: 100%; }
    .ui { position: absolute; inset: 0; pointer-events: none; }

    .btns {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      pointer-events: auto;
    }

    .skill {
      width: 68px;
      height: 68px;
      border: 0;
      border-radius: 18px;
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: 0 8px 24px rgba(0,0,0,.26), inset 0 0 0 1px rgba(255,255,255,.22);
      color: #fff;
      font-size: 28px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform .08s ease;
    }
    .skill:active { transform: scale(.95); }

    #btnCam {
      position: absolute;
      left: 14px;
      bottom: 14px;
      pointer-events: auto;
      background: rgba(32,32,32,.9);
      color: #fff;
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <video id="bg" autoplay playsinline muted></video>
    <canvas id="fx"></canvas>

    <div class="ui">
      <div class="btns">
        <button class="skill" id="btnShield" aria-label="舉盾">🛡️</button>
        <button class="skill" id="btnRoar" aria-label="怒吼">💢</button>
        <button class="skill" id="btnSlash" aria-label="揮刀">⚔️</button>
      </div>

      <button id="btnCam">啟動相機</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('fx');
  const ctx = canvas.getContext('2d');
  const video = document.getElementById('bg');
  const btnCam = document.getElementById('btnCam');

  const dogImg = new Image();
  dogImg.src = './assets/dog.jpg';

  const dog = {
    x: 0, y: 0,
    vx: 0, vy: 0,
    speed: 220,
    facing: 1,
    walkPhase: 0,
    state: 'idle' // idle|left|right|forward|back
  };

  const joy = {
    active: false, id: null,
    baseX: 0, baseY: 0,
    knobX: 0, knobY: 0,
    dx: 0, dy: 0,
    max: 46
  };

  let shieldUntil = 0;
  let roarUntil = 0;
  let slashUntil = 0;
  const roars = [];
  let last = performance.now();

  function resize() {
    canvas.width = innerWidth * devicePixelRatio;
    canvas.height = innerHeight * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    if (!dog.x) {
      dog.x = innerWidth * 0.45;
      dog.y = innerHeight * 0.72;
    }
  }
  addEventListener('resize', resize);
  resize();

  async function startCam() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      });
      video.srcObject = stream;
      btnCam.style.display = 'none'; // 啟動後隱藏
    } catch (e) {
      btnCam.textContent = '相機不可用';
    }
  }
  btnCam.onclick = startCam;

  function setJoyFromPoint(x, y) {
    if (!joy.active) return;
    const dx = x - joy.baseX;
    const dy = y - joy.baseY;
    const dist = Math.hypot(dx, dy) || 1;
    const c = Math.min(joy.max, dist);
    joy.knobX = joy.baseX + (dx / dist) * c;
    joy.knobY = joy.baseY + (dy / dist) * c;
    joy.dx = (joy.knobX - joy.baseX) / joy.max;
    joy.dy = (joy.knobY - joy.baseY) / joy.max;
  }

  function onDown(e) {
    const p = e.touches ? e.changedTouches[0] : e;
    joy.active = true;
    joy.id = p.identifier ?? 'mouse';
    joy.baseX = p.clientX;
    joy.baseY = p.clientY;
    joy.knobX = p.clientX;
    joy.knobY = p.clientY;
    joy.dx = joy.dy = 0;
  }

  function onMove(e) {
    if (!joy.active) return;
    if (e.touches) {
      for (const t of e.touches) if (t.identifier === joy.id) setJoyFromPoint(t.clientX, t.clientY);
    } else {
      setJoyFromPoint(e.clientX, e.clientY);
    }
  }

  function onUp() {
    joy.active = false;
    joy.dx = joy.dy = 0;
  }

  canvas.addEventListener('pointerdown', onDown);
  canvas.addEventListener('pointermove', onMove);
  addEventListener('pointerup', onUp);
  canvas.addEventListener('touchstart', onDown, { passive: true });
  canvas.addEventListener('touchmove', onMove, { passive: true });
  addEventListener('touchend', onUp, { passive: true });

  document.getElementById('btnShield').onclick = () => { shieldUntil = performance.now() + 1100; };
  document.getElementById('btnRoar').onclick = () => {
    roarUntil = performance.now() + 700;
    roars.push({ x: dog.x, y: dog.y - 36, t: performance.now() });
  };
  document.getElementById('btnSlash').onclick = () => { slashUntil = performance.now() + 520; };

  function updateState() {
    const ax = Math.abs(dog.vx), ay = Math.abs(dog.vy);
    if (ax < 8 && ay < 8) { dog.state = 'idle'; return; }
    if (ax > ay) dog.state = dog.vx > 0 ? 'right' : 'left';
    else dog.state = dog.vy > 0 ? 'forward' : 'back';
  }

  function tick(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;

    dog.vx = joy.dx * dog.speed;
    dog.vy = joy.dy * dog.speed;
    dog.x += dog.vx * dt;
    dog.y += dog.vy * dt;
    dog.x = Math.max(56, Math.min(innerWidth - 56, dog.x));
    dog.y = Math.max(120, Math.min(innerHeight - 24, dog.y));

    if (Math.abs(dog.vx) > 8) dog.facing = Math.sign(dog.vx);

    const moving = Math.hypot(dog.vx, dog.vy) > 10;
    dog.walkPhase += dt * (moving ? 10 : 2.5);
    updateState();

    draw(now);
    requestAnimationFrame(tick);
  }

  function drawDog(now) {
    const p = Math.sin(dog.walkPhase);

    // 依方向給不同動作參數（分開前後左右）
    let tilt = 0, sx = 1, sy = 1, bob = 0;

    if (dog.state === 'left' || dog.state === 'right') {
      tilt = p * 0.06;
      sx = 1 + Math.abs(p) * 0.06;
      sy = 1 - Math.abs(p) * 0.05;
      bob = p * 5;
    } else if (dog.state === 'forward') {
      tilt = 0;
      sx = 1.02 + Math.abs(p) * 0.03;
      sy = 0.9 + Math.abs(p) * 0.05;
      bob = p * 3;
    } else if (dog.state === 'back') {
      tilt = 0;
      sx = 0.95 - Math.abs(p) * 0.02;
      sy = 1.02 + Math.abs(p) * 0.03;
      bob = p * 2;
    } else {
      bob = Math.sin(dog.walkPhase * 0.5) * 2;
    }

    const w = 146;
    const h = 146;

    // shadow
    ctx.save();
    ctx.translate(dog.x, dog.y + 22);
    ctx.scale(1 + Math.abs(dog.vx) / 600, 1 - Math.abs(dog.vy) / 900);
    ctx.beginPath();
    ctx.ellipse(0, 0, 34, 14, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.fill();
    ctx.restore();

    // body
    ctx.save();
    ctx.translate(dog.x, dog.y + bob);
    ctx.scale(dog.facing, 1);
    ctx.rotate(tilt);
    ctx.scale(sx, sy);

    if (dogImg.complete) {
      ctx.drawImage(dogImg, -w / 2, -h / 2, w, h);
    } else {
      ctx.font = '74px "Apple Color Emoji","Segoe UI Emoji"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐕', 0, 0);
    }

    if (now < shieldUntil) {
      ctx.font = '38px "Apple Color Emoji","Segoe UI Emoji"';
      ctx.fillText('🛡️', 45, -6);
    }

    if (now < slashUntil) {
      const q = 1 - (slashUntil - now) / 520;
      ctx.save();
      ctx.rotate((dog.facing > 0 ? 1 : -1) * (-0.8 + q * 1.6));
      ctx.font = '42px "Apple Color Emoji","Segoe UI Emoji"';
      ctx.fillText('⚔️', 52, -22);
      ctx.restore();
    }

    if (now < roarUntil) {
      ctx.fillStyle = 'rgba(255,255,255,.96)';
      ctx.strokeStyle = 'rgba(0,0,0,.45)';
      ctx.lineWidth = 4;
      ctx.font = '700 30px system-ui';
      ctx.strokeText('嗷嗚！！', 0, -82);
      ctx.fillText('嗷嗚！！', 0, -82);
    }

    ctx.restore();
  }

  function drawRoars(now) {
    for (let i = roars.length - 1; i >= 0; i--) {
      const r = roars[i];
      const age = now - r.t;
      if (age > 650) { roars.splice(i, 1); continue; }
      const k = age / 650;
      const radius = 22 + k * 120;
      ctx.beginPath();
      ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,140,60,${1 - k})`;
      ctx.lineWidth = 6 * (1 - k) + 1;
      ctx.stroke();
    }
  }

  function drawJoystick() {
    if (!joy.active) return;
    ctx.beginPath();
    ctx.arc(joy.baseX, joy.baseY, joy.max, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,.14)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(joy.knobX, joy.knobY, 24, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,.52)';
    ctx.fill();
  }

  function draw(now) {
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    drawRoars(now);
    drawDog(now);
    drawJoystick();
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
