<!doctype html>
<html lang="zh-Hant"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>我的刀盾 特效 Demo</title>
<style>html,body{margin:0;height:100%;background:#111;overflow:hidden;font-family:system-ui,sans-serif}#wrap{position:fixed;inset:0}#bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.6)}#fx{position:absolute;inset:0;width:100%;height:100%}.ui{position:absolute;inset:0;pointer-events:none}.hint{position:absolute;top:14px;left:14px;color:#fff;background:rgba(0,0,0,.35);padding:8px 12px;border-radius:10px;font-size:13px}.btns{position:absolute;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;pointer-events:auto}button{border:0;color:#fff;font-weight:700;border-radius:999px;width:76px;height:76px;font-size:14px;line-height:1.2;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.35)}.shield{background:#4b6bff}.roar{background:#ff7a2f}.slash{background:#ef4444}.cam{position:absolute;left:14px;bottom:14px;pointer-events:auto;background:#222;color:#fff;border:0;border-radius:10px;padding:10px 14px}</style></head>
<body><div id="wrap"><video id="bg" autoplay playsinline muted></video><canvas id="fx"></canvas><div class="ui"><div class="hint">長按或拖曳螢幕任一處出現搖桿控制狗狗移動</div><div class="btns"><button class="shield" id="btnShield">舉盾</button><button class="roar" id="btnRoar">怒吼</button><button class="slash" id="btnSlash">揮刀</button></div><button id="btnCam" class="cam">啟動相機</button></div></div>
<script>(()=>{const canvas=document.getElementById('fx'),ctx=canvas.getContext('2d'),video=document.getElementById('bg'),btnCam=document.getElementById('btnCam');const dog={x:0,y:0,vx:0,vy:0,speed:220,facing:1,bob:0};const joy={active:false,id:null,baseX:0,baseY:0,knobX:0,knobY:0,dx:0,dy:0,max:45};let shieldUntil=0,roarUntil=0,slashUntil=0,last=performance.now();const roars=[];function resize(){canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);if(!dog.x){dog.x=innerWidth*.45;dog.y=innerHeight*.72}}addEventListener('resize',resize);resize();async function startCam(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});video.srcObject=s;btnCam.textContent='相機已啟動';btnCam.disabled=true}catch{btnCam.textContent='相機不可用'}}btnCam.onclick=startCam;function setJoyFromPoint(x,y){if(!joy.active)return;const dx=x-joy.baseX,dy=y-joy.baseY,d=Math.hypot(dx,dy)||1,clamped=Math.min(joy.max,d);joy.knobX=joy.baseX+dx/d*clamped;joy.knobY=joy.baseY+dy/d*clamped;joy.dx=(joy.knobX-joy.baseX)/joy.max;joy.dy=(joy.knobY-joy.baseY)/joy.max}function onDown(e){const p=e.touches?e.changedTouches[0]:e;joy.active=true;joy.id=p.identifier??'mouse';joy.baseX=p.clientX;joy.baseY=p.clientY;joy.knobX=p.clientX;joy.knobY=p.clientY;joy.dx=joy.dy=0}function onMove(e){if(!joy.active)return;if(e.touches){for(const t of e.touches)if(t.identifier===joy.id)setJoyFromPoint(t.clientX,t.clientY)}else setJoyFromPoint(e.clientX,e.clientY)}function onUp(){joy.active=false;joy.dx=joy.dy=0}canvas.addEventListener('pointerdown',onDown);canvas.addEventListener('pointermove',onMove);addEventListener('pointerup',onUp);canvas.addEventListener('touchstart',onDown,{passive:true});canvas.addEventListener('touchmove',onMove,{passive:true});addEventListener('touchend',onUp,{passive:true});document.getElementById('btnShield').onclick=()=>shieldUntil=performance.now()+1200;document.getElementById('btnRoar').onclick=()=>{roarUntil=performance.now()+700;roars.push({x:dog.x,y:dog.y-35,t:performance.now()})};document.getElementById('btnSlash').onclick=()=>slashUntil=performance.now()+550;function tick(now){const dt=Math.min(.033,(now-last)/1e3);last=now;dog.vx=joy.dx*dog.speed;dog.vy=joy.dy*dog.speed;dog.x+=dog.vx*dt;dog.y+=dog.vy*dt;dog.x=Math.max(30,Math.min(innerWidth-30,dog.x));dog.y=Math.max(80,Math.min(innerHeight-20,dog.y));if(Math.abs(dog.vx)>8)dog.facing=Math.sign(dog.vx);dog.bob+=dt*(Math.hypot(dog.vx,dog.vy)>10?8:3);draw(now);requestAnimationFrame(tick)}function drawDog(now){const bobY=Math.sin(dog.bob)*4;ctx.save();ctx.translate(dog.x,dog.y+bobY);ctx.scale(dog.facing,1);ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='74px "Apple Color Emoji","Segoe UI Emoji"';ctx.fillText('🐕',0,0);if(now<shieldUntil){ctx.font='42px "Apple Color Emoji","Segoe UI Emoji"';ctx.fillText('🛡️',40,-8)}if(now<slashUntil){const p=1-(slashUntil-now)/550;ctx.rotate((dog.facing>0?1:-1)*(-.8+p*1.6));ctx.font='46px "Apple Color Emoji","Segoe UI Emoji"';ctx.fillText('⚔️',52,-20)}if(now<roarUntil){ctx.fillStyle='rgba(255,255,255,.95)';ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=4;ctx.font='700 34px system-ui';ctx.strokeText('嗷嗚！！',0,-74);ctx.fillText('嗷嗚！！',0,-74)}ctx.restore()}function drawRoars(now){for(let i=roars.length-1;i>=0;i--){const r=roars[i],age=now-r.t;if(age>650){roars.splice(i,1);continue}const p=age/650,rad=24+p*120;ctx.beginPath();ctx.arc(r.x,r.y,rad,0,Math.PI*2);ctx.strokeStyle=`rgba(255,140,60,${1-p})`;ctx.lineWidth=6*(1-p)+1;ctx.stroke()}}function drawJoystick(){if(!joy.active)return;ctx.beginPath();ctx.arc(joy.baseX,joy.baseY,joy.max,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.18)';ctx.fill();ctx.beginPath();ctx.arc(joy.knobX,joy.knobY,24,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.55)';ctx.fill()}function draw(now){ctx.clearRect(0,0,innerWidth,innerHeight);ctx.fillStyle='rgba(255,255,255,.95)';ctx.strokeStyle='rgba(0,0,0,.45)';ctx.lineWidth=6;ctx.font='800 44px system-ui';ctx.textAlign='center';ctx.strokeText('我的刀盾',innerWidth*.5,78);ctx.fillText('我的刀盾',innerWidth*.5,78);drawRoars(now);drawDog(now);drawJoystick()}requestAnimationFrame(tick)})();</script>
</body></html>
